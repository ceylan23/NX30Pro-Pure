name: OpenWrt Builder (NX30 Pro - Ultimate Final)

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x
  REPO_BRANCH: openwrt-21.02
  SSH_ACTIONS: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        # 强行干掉 Ubuntu 后台自动更新服务，释放 apt 进程锁
        sudo systemctl stop apt-daily.timer || true
        sudo systemctl stop apt-daily-upgrade.timer || true
        sudo systemctl disable apt-daily.timer || true
        sudo systemctl disable apt-daily-upgrade.timer || true
        sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock
        
        # 显示完整进度防止假死
        sudo -E apt-get update
        sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        # 拉取最新版 MosDNS 及其必需依赖到 package 目录
        git clone https://github.com/sbwml/luci-app-mosdns -b v5 package/mosdns
        git clone https://github.com/sbwml/v2ray-geodata package/v2ray-geodata

    - name: Update & Install feeds
      run: |
        cd openwrt
        # 强制 Git 使用 HTTPS 链接，避开 SSH 权限错误
        git config --global url."https://github.com/".insteadOf "git@github.com:"
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 清理自带的冲突旧包
        rm -rf feeds/packages/net/v2ray-geodata
        rm -rf feeds/packages/net/mosdns
        rm -rf feeds/luci/applications/luci-app-mosdns
        
        # 强行替换 Go 编译器环境为 1.22.x，解决 MosDNS v5 的 go.mod 报错
        rm -rf feeds/packages/lang/golang
        git clone https://github.com/sbwml/packages_lang_golang -b 22.x feeds/packages/lang/golang

    - name: Pre-configure (NX30Pro Auto Target)
      run: |
        cd openwrt
        # 应用官方机型配置模板
        [ -f "defconfig/mt7981-ax3000.config" ] && cp -f defconfig/mt7981-ax3000.config .config
        
        # 注入插件配置
        echo "CONFIG_PACKAGE_luci-app-mtk=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-autoreboot=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-filetransfer=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-wrtbwmon=y" >> .config
        
        # 强制生成完整依赖配置
        make defconfig

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: env.SSH_ACTIONS == 'true'

    - name: Download package
      run: |
        cd openwrt
        make download -j8 || make download -j1 V=s
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      run: |
        cd openwrt/bin/targets/mediatek/mt7981
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload firmware
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_NX30Pro${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
