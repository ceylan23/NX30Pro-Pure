name: OpenWrt Builder (NX30 Pro - 6.6 Ultimate Final)

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-24.10
  REPO_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        # 释放 apt 进程锁
        sudo systemctl stop apt-daily.timer || true
        sudo systemctl stop apt-daily-upgrade.timer || true
        sudo systemctl disable apt-daily.timer || true
        sudo systemctl disable apt-daily-upgrade.timer || true
        sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock
        
        # 安装编译依赖
        sudo -E apt-get update
        sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        # 拉取 MosDNS 及依赖
        git clone https://github.com/sbwml/luci-app-mosdns -b v5 package/mosdns
        git clone https://github.com/sbwml/v2ray-geodata package/v2ray-geodata

    - name: Update & Install feeds
      run: |
        cd openwrt
        # 强制 HTTPS 链接避开 SSH 权限错误
        git config --global url."https://github.com/".insteadOf "git@github.com:"
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 清理冲突旧包
        rm -rf feeds/packages/net/v2ray-geodata
        rm -rf feeds/packages/net/mosdns
        rm -rf feeds/luci/applications/luci-app-mosdns
        
        # 升级 Go 编译器
        rm -rf feeds/packages/lang/golang
        git clone https://github.com/sbwml/packages_lang_golang feeds/packages/lang/golang

    - name: Pre-configure (NX30Pro Auto Target)
      run: |
        cd openwrt
        # 尝试应用官方模板
        [ -f "defconfig/mt7981-ax3000.config" ] && cp -f defconfig/mt7981-ax3000.config .config || true
        
        # 锁定目标机型
        cat >> .config <<EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_mediatek_mt7981=y
        CONFIG_TARGET_mediatek_filogic_DEVICE_h3c_magic-nx30-pro=y
        CONFIG_TARGET_mediatek_mt7981_DEVICE_h3c_magic-nx30-pro=y
        EOF
        
        # 注入自定义插件
        echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-autoreboot=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-filetransfer=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-wrtbwmon=y" >> .config
        
        # 强制生成完整依赖
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8 || make download -j1 V=s
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      run: |
        cd openwrt/bin/targets/mediatek/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload firmware
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_NX30Pro_6.6${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
